<div class="appointment-container">
  <h2>Agendar Cita</h2>

  <form [formGroup]="appointmentForm" (ngSubmit)="submit()" class="appointment-form">
    <label for="professionalId">Profesional:</label>
    <input
      id="professionalId"
      type="text"
      formControlName="professionalId"
      placeholder="ID del profesional"
      (blur)="checkAvailability()"
    />

    <label for="date">Fecha:</label>
    <input
      id="date"
      type="date"
      formControlName="date"
      (change)="checkAvailability()"
    />

    <label for="time">Hora:</label>
    <select id="time" formControlName="time">
      <option *ngFor="let slot of availableSlots" [value]="slot">
        {{ slot }}
      </option>
    </select>

    <button type="submit" [disabled]="submitting || appointmentForm.invalid">
      Agendar
    </button>
  </form>

  <div class="message" *ngIf="message">{{ message }}</div>
</div>
